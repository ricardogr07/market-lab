experiment_name: voo_paper_daily

data:
  symbols: [VOO]
  start_date: "2018-01-01"
  end_date: "2026-12-31"
  interval: "1d"
  cache_dir: "artifacts/data-voo-paper-daily"
  prepared_panel_filename: "panel.csv"

features:
  return_windows: [5, 10, 20, 40]
  ma_windows: [10, 20, 50]
  vol_windows: [10, 20]
  momentum_window: 20

target:
  horizon_days: 1
  type: "direction"

portfolio:
  ranking:
    long_n: 1
    short_n: 1
    rebalance_frequency: "D"
    weighting: "equal"
    mode: "long_only"
    min_score_threshold: 0.55
    cash_when_underfilled: true
  costs:
    bps_per_trade: 10

baselines:
  buy_hold: true
  sma:
    enabled: true
    fast_window: 20
    slow_window: 50

models:
  - name: logistic_regression
  - name: logistic_l1
  - name: random_forest
  - name: extra_trees
  - name: gradient_boosting
  - name: hist_gradient_boosting

evaluation:
  walk_forward:
    train_years: 3
    test_months: 1
    step_months: 1
    min_train_rows: 200
    min_test_rows: 15
    min_train_positive_rate: 0.05
    min_test_positive_rate: 0.05
    embargo_periods: 1

paper:
  enabled: true
  data_provider: "alpaca"
  broker: "alpaca"
  execution_mode: "agent_approval"
  agent_backend: "openai"
  agent_model: "gpt-4o-mini"
  agent_timeout_seconds: 30
  agent_fallback_backend: "deterministic_consensus"
  consensus_min_long_votes: 4
  schedule_timezone: "America/New_York"
  decision_time: "16:10"
  submission_time: "19:05"
  order_type: "day_market"
  position_sizing: "full_equity_fractional"
  approval_inbox_dir: "artifacts/paper/inbox"
  state_dir: "artifacts/paper/state"
  poll_interval_seconds: 30

artifacts:
  output_dir: "artifacts/runs"
  save_predictions: true
  save_metrics_csv: true
  save_report_md: true
  save_plots: true
