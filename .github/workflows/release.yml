name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    # Monthly-batching-friendly behavior: normal merges to master update the
    # open Release PR, and only merging that Release PR cuts a public release.
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      html_url: ${{ steps.release.outputs.html_url }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  publish:
    name: publish
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build setuptools wheel

      - name: Build release distributions
        run: python -m build --no-isolation

      - name: Upload workflow build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ needs.release-please.outputs.tag_name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

      - name: Attach distributions to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
