[tox]
env_list = lint, docs, typecheck, py312, py313, py314, integration, package, mcp-docker, preflight-fast, preflight-slow, preflight
skip_missing_interpreters = true
isolated_build = true
work_dir = {tox_root}{/}.tox

[testenv]
description = Run the fast deterministic unit suite through the bootstrapped Python environment
package = editable
extras = mcp
deps =
    pytest>=8.0
commands =
    {envpython} -m pytest -q tests/unit --basetemp .pytest_tmp_unit

[testenv:integration]
description = Run the offline integration test suite through the bootstrapped Python environment
basepython = py312
package = editable
deps =
    pytest>=8.0
commands =
    {envpython} -m pytest -q tests/integration -m "not real_data and not network" --basetemp .pytest_tmp_integration

[testenv:lint]
description = Run Ruff across the repository
basepython = py312
skip_install = true
deps =
    ruff>=0.11
commands =
    {envpython} -m ruff check .

[testenv:docs]
description = Build the MkDocs site with strict warnings
basepython = py312
skip_install = true
deps =
    mkdocs>=1.6
commands =
    {envpython} -m mkdocs build --strict

[testenv:typecheck]
description = Run mypy across the current typed MarketLab module subset
basepython = py312
package = editable
deps =
    mypy>=1.20
commands =
    {envpython} -m mypy src/marketlab/config.py src/marketlab/data/market.py src/marketlab/paper/alpaca.py src/marketlab/paper/notifications.py src/marketlab/paper/contracts.py src/marketlab/paper/agent.py src/marketlab/paper/scheduler.py

[testenv:package]
description = Build source and wheel distributions
basepython = py312
skip_install = true
deps =
    build>=1.2
    setuptools>=69
    wheel
set_env =
    TMP = {tox_root}{/}.package-smoke
    TEMP = {tox_root}{/}.package-smoke
    TMPDIR = {tox_root}{/}.package-smoke
commands =
    {envpython} -m build --no-isolation
    {envpython} scripts/check_package.py

[testenv:mcp-docker]
description = Build the Docker image and exercise the MarketLab MCP stdio bridge through docker exec
basepython = py312
package = editable
extras = mcp
deps =
    anyio>=4.0
commands =
    {envpython} scripts/check_mcp_docker.py

[testenv:preflight-fast]
description = Run the fast local validation gate through the CI-aligned tox envs
basepython = py312
skip_install = true
env_dir = {work_dir}{/}.preflight-fast-local
deps =
    tox>=4.0
commands =
    {envpython} -m tox -e lint,docs,typecheck,py312

[testenv:preflight-slow]
description = Run the slow local validation gate through the CI-aligned tox envs
basepython = py312
skip_install = true
env_dir = {work_dir}{/}.preflight-slow-local
deps =
    tox>=4.0
commands =
    {envpython} -m tox -e package,integration

[testenv:preflight]
description = Run the local pre-push CI check set through the CI tox envs
basepython = py312
skip_install = true
env_dir = {work_dir}{/}.preflight-local
deps =
    tox>=4.0
commands =
    {envpython} -m tox -e lint,docs,typecheck,package,py312,integration
