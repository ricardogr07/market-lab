[tox]
env_list = lint, docs, py312, py313, py314, package, preflight
skip_missing_interpreters = true
isolated_build = true
work_dir = {tox_root}{/}.tox-phase3

[testenv]
description = Run the MarketLab test suite through the bootstrapped Python environment
skip_install = true
allowlist_externals =
    py
    python
set_env =
    VIRTUALENV_ALWAYS_COPY = true
    VIRTUALENV_NO_PIP = true
    VIRTUALENV_NO_SETUPTOOLS = true
    VIRTUALENV_NO_WHEEL = true
commands =
    {env:RUNNER_PYTHON:py} -m pytest -q --basetemp .pytest_tmp

[testenv:lint]
description = Run Ruff across the repository
skip_install = true
commands =
    {env:RUNNER_PYTHON:py} -m ruff check .

[testenv:docs]
description = Build the MkDocs site with strict warnings
skip_install = true
commands =
    {env:RUNNER_PYTHON:py} -m mkdocs build --strict

[testenv:package]
description = Build source and wheel distributions
skip_install = true
commands =
    {env:RUNNER_PYTHON:py} -m build --no-isolation

[testenv:preflight]
description = Run the Phase 3 local CI check set
skip_install = true
commands =
    {env:RUNNER_PYTHON:py} -m tox -e lint,docs,package,py312
