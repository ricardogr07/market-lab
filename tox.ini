[tox]
env_list = lint, docs, py312, py313, py314, package, preflight
skip_missing_interpreters = true
isolated_build = true
work_dir = {tox_root}{/}.tox-phase3

[testenv]
description = Run the MarketLab test suite through the bootstrapped Python environment
deps =
    pytest>=8.0
skip_install = true
allowlist_externals =
    python
commands =
    python -m pytest -q --basetemp .pytest_tmp

[testenv:lint]
description = Run Ruff across the repository
skip_install = true
deps =
    ruff>=0.11
commands =
    python -m ruff check .

[testenv:docs]
description = Build the MkDocs site with strict warnings
skip_install = true
deps =
    mkdocs>=1.6
    mkdocs-include-markdown-plugin>=7.1
commands =
    python -m mkdocs build --strict

[testenv:package]
description = Build source and wheel distributions
skip_install = true
deps =
    build>=1.2
commands =
    python -m build --no-isolation

[testenv:preflight]
description = Run the Phase 3 local CI check set
skip_install = true
deps =
    tox>=4.0
commands =
    python -m tox -e lint,docs,package,py312
