[tox]
env_list = lint, docs, py312, py313, py314, integration, package, preflight
skip_missing_interpreters = true
isolated_build = true
work_dir = {tox_root}{/}.tox-phase3

[testenv]
description = Run the fast deterministic unit suite through the bootstrapped Python environment
package = editable
deps =
    pytest>=8.0
commands =
    {envpython} -m pytest -q tests/unit --basetemp .pytest_tmp_unit

[testenv:integration]
description = Run the offline integration test suite through the bootstrapped Python environment
package = editable
deps =
    pytest>=8.0
commands =
    {envpython} -m pytest -q tests/integration -m "not real_data and not network" --basetemp .pytest_tmp_integration

[testenv:lint]
description = Run Ruff across the repository
skip_install = true
deps =
    ruff>=0.11
commands =
    {envpython} -m ruff check .

[testenv:docs]
description = Build the MkDocs site with strict warnings
skip_install = true
deps =
    mkdocs>=1.6
    mkdocs-include-markdown-plugin>=7.1
commands =
    {envpython} -m mkdocs build --strict

[testenv:package]
description = Build source and wheel distributions
skip_install = true
deps =
    build>=1.2
    setuptools>=69
    wheel
commands =
    {envpython} -m build --no-isolation

[testenv:preflight]
description = Run the local pre-push CI check set through the CI tox envs
skip_install = true
env_dir = {work_dir}{/}.preflight-local
deps =
    tox>=4.0
commands =
    {envpython} -m tox -e lint,docs,package,py312,integration
