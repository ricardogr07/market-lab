[tox]
env_list = py312, py313, py314, package
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run the MarketLab test suite
extras = dev
set_env =
    VIRTUALENV_OVERRIDE_APP_DATA = {tox_root}{/}.tox{/}virtualenv_app_data
    TEMP = {tox_root}{/}.tox{/}tmp
    TMP = {tox_root}{/}.tox{/}tmp
commands =
    python -m pytest -q --basetemp .pytest_tmp

[testenv:package]
description = Build source and wheel distributions
skip_install = true
deps =
    build>=1.2
    setuptools>=69
    wheel
set_env =
    VIRTUALENV_OVERRIDE_APP_DATA = {tox_root}{/}.tox{/}virtualenv_app_data
    TEMP = {tox_root}{/}.tox{/}tmp
    TMP = {tox_root}{/}.tox{/}tmp
commands =
    python -m build --no-isolation
